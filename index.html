<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ссылки Ермолаева Влада</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(#2a1816, #3a221d);
    color: #2d1f1a;
}

.container {
    max-width: 520px;
    margin: 80px auto;
    background: #fdf6ea;
    border-radius: 20px;
    padding: 50px 34px 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
}

.logo {
    display: block;
    margin: 0 auto 20px;
    max-width: 80px;
    opacity: 0.9;
}

h1 {
    text-align: center;
    color: #8c2d1f;
    font-size: 28px;
    letter-spacing: 1px;
    margin-bottom: 10px;
}

.subhead {
    text-align: center;
    font-style: italic;
    color: #a67c52;
    margin-bottom: 35px;
}

.card {
    background: #f7efe5;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    transition: 0.2s;
    border: 1px solid #eadfce;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}

.link-title a {
    text-decoration: none;
    color: #8c2d1f;
    font-weight: 600;
}

.link-title a:hover {
    text-decoration: underline;
}

.row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
}

.field {
    background: transparent;
    padding: 6px 4px;
    border-radius: 6px;
    font-size: 14px;
    color: #5a4036;
    word-break: break-all;
    flex: 1;
    margin-right: 10px;
    border-bottom: 1px solid #e0d2c2;
}

.copy-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 18px;
    opacity: 0.6;
    transition: 0.2s;
}

.copy-btn:hover {
    opacity: 1;
}

.footer {
    text-align: center;
    font-size: 13px;
    color: #a67c52;
    margin-top: 25px;
}

.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #8c2d1f;
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: 0.3s;
}

.toast.show {
    opacity: 1;
}
</style>
</head>

<body>

<div class="container">

<img src="Большой_театр_логотип.png" class="logo">

<h1>ЕРМОЛАЕВ ВЛАД</h1>
<div class="subhead">Мои контакты и ссылки</div>

<div class="card">
    <div class="link-title"><a href="tel:+79099198580">📞 Телефон</a></div>
    <div class="row">
        <div class="field">+7 (909) 919-85-80</div>
        <button class="copy-btn" data-copy="+79099198580">📋</button>
    </div>
</div>

<div class="card">
    <div class="link-title"><a href="mailto:Vlad.ermolaev96@gmail.com">📧 Электронная почта</a></div>
    <div class="row">
        <div class="field">Vlad.ermolaev96@gmail.com</div>
        <button class="copy-btn" data-copy="Vlad.ermolaev96@gmail.com">📋</button>
    </div>
</div>

<div class="card">
    <div class="link-title"><a href="https://t.me/Schoko_Vlad" target="_blank">✈️ Telegram</a></div>
    <div class="row">
        <div class="field">t.me/Schoko_Vlad</div>
        <button class="copy-btn" data-copy="https://t.me/Schoko_Vlad">📋</button>
    </div>
</div>

<div class="footer">Нажмите на название, чтобы перейти, или скопируйте адрес с помощью кнопки 📋</div>

</div>

<div id="toast" class="toast">Скопировано</div>

<script>
const buttons = document.querySelectorAll('.copy-btn');
const toast = document.getElementById('toast');

function showToast() {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
}

buttons.forEach(btn => {
    btn.addEventListener('click', () => {
        const text = btn.dataset.copy;
        navigator.clipboard.writeText(text);
        showToast();
    });
});
</script>

</body>
</html>
