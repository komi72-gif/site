<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ссылки Владислава Ермолаева</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(#2a1816, #3a221d);
    color: #2d1f1a;
}

.container {
    max-width: 520px;
    margin: 80px auto;
    background: #fdf6ea;
    border-radius: 20px;
    padding: 50px 34px 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
}

.logo {
    display: block;
    margin: 0 auto 20px;
    max-width: 80px;
    opacity: 0.9;
}

h1 {
    text-align: center;
    color: #8c2d1f;
    font-size: 28px;
    letter-spacing: 1px;
    margin-bottom: 10px;
}

.subhead {
    text-align: center;
    font-style: italic;
    color: #a67c52;
    margin-bottom: 35px;
}

.card {
    background: #f7efe5;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    transition: 0.2s;
    border: 1px solid #eadfce;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}

.link-title a {
    text-decoration: none;
    color: #8c2d1f;
    font-weight: 600;
}

.link-title a:hover {
    text-decoration: underline;
}

.row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
}

.field {
    background: transparent;
    padding: 6px 4px;
    border-radius: 6px;
    font-size: 14px;
    color: #5a4036;
    word-break: break-all;
    flex: 1;
    margin-right: 10px;
    border-bottom: 1px solid #e0d2c2;
}

.copy-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 18px;
    opacity: 0.6;
    transition: 0.2s;
}

.copy-btn:hover {
    opacity: 1;
}

/* Стили для новой кнопки сохранения контакта */
.save-contact-btn {
    background: #8c2d1f;
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.save-contact-btn:hover {
    background: #6e2419;
}

.footer {
    text-align: center;
    font-size: 13px;
    color: #a67c52;
    margin-top: 25px;
}

.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #8c2d1f;
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: 0.3s;
    z-index: 1000;
}

.toast.show {
    opacity: 1;
}
</style>
</head>

<body>

<div class="container">

<img src="Большой_театр_логотип.png" class="logo">

<h1>ВЛАДИСЛАВ ЕРМОЛАЕВ</h1>
<div class="subhead">Мои контакты и ссылки</div>

<div class="card">
    <div class="link-title"><a href="tel:+79099198580">📞 Телефон</a></div>
    <div class="row">
        <div class="field" id="phoneField">+7 (909) 919-85-80</div>
        <button class="copy-btn" data-copy="+79099198580">📋</button>
    </div>
</div>

<div class="card">
    <div class="link-title"><a href="mailto:Vlad.ermolaev96@gmail.com">📧 Электронная почта</a></div>
    <div class="row">
        <div class="field" id="emailField">Vlad.ermolaev96@gmail.com</div>
        <button class="copy-btn" data-copy="Vlad.ermolaev96@gmail.com">📋</button>
    </div>
</div>

<div class="card">
    <div class="link-title"><a href="https://t.me/Schoko_Vlad" target="_blank">✈️ Telegram</a></div>
    <div class="row">
        <div class="field">t.me/Schoko_Vlad</div>
        <button class="copy-btn" data-copy="https://t.me/Schoko_Vlad">📋</button>
    </div>
</div>

<!-- Новая карточка с кнопкой для сохранения контакта -->
<div class="card">
    <div class="link-title">📇 Сохранить контакт</div>
    <div style="margin-top: 12px;">
        <button id="saveContactBtn" class="save-contact-btn">➕ Сохранить в телефонную книгу</button>
    </div>
</div>

<div class="footer">Нажмите на название, чтобы перейти, или скопируйте адрес с помощью кнопки 📋</div>

</div>

<div id="toast" class="toast">Скопировано</div>

<script>
// Функция показа уведомления
const toast = document.getElementById('toast');
function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
}

// Копирование текста
const copyButtons = document.querySelectorAll('.copy-btn');
copyButtons.forEach(btn => {
    btn.addEventListener('click', () => {
        const text = btn.dataset.copy;
        navigator.clipboard.writeText(text);
        showToast('Скопировано');
    });
});

// Новая функция сохранения контакта
const saveContactBtn = document.getElementById('saveContactBtn');
if (saveContactBtn) {
    saveContactBtn.addEventListener('click', () => {
        // Берём данные из полей
        const phoneRaw = document.getElementById('phoneField')?.innerText || '+7 (909) 919-85-80';
        const emailRaw = document.getElementById('emailField')?.innerText || 'Vlad.ermolaev96@gmail.com';
        // Очищаем телефон от лишних символов, оставляем только цифры и плюс (для vCard)
        const phoneClean = phoneRaw.replace(/[^\d+]/g, '');
        const email = emailRaw.trim();
        const name = 'Владислав Ермолаев';

        // Формируем vCard
        const vCardData = `BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL;TYPE=CELL:${phoneClean}
EMAIL:${email}
END:VCARD`;

        // Создаём Blob и предлагаем сохранить
        try {
            const blob = new Blob([vCardData], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'contact.vcf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('Контакт сохранён! Откройте файл, чтобы добавить в книгу.');
        } catch (err) {
            // Запасной вариант: data URI
            const dataUri = 'data:text/vcard;charset=utf-8,' + encodeURIComponent(vCardData);
            window.location.href = dataUri;
            showToast('Если файл не скачался, нажмите ещё раз');
        }
    });
}
</script>

</body>
</html>
